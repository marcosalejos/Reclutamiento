<!DOCTYPE html>
<html lang="es">

{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observaciones - Okoa</title>
    <link rel="icon" href="https://okoa.tech/wp-content/uploads/2023/06/3.jpg">
    <link rel="stylesheet" href="{% static 'css/observacionesSoli.css' %}">
</head>
<body>
    <main>
        <div class="header">
            <div class="home_icon">
                <a href="{% url 'solicitudes' %}">
                    <img src="{% static 'imagenes/flechaAzul.png' %}" alt="Back">
                </a>
            </div>
            <div class="logo">
                <img src="https://okoa.tech/wp-content/uploads/2023/04/Logo-Okoa-B.png" alt="Logo">
            </div>
            <div class="home_icon">
                {% if nombre in adminList %}
                <a href="{% url 'observacion' id %}">
                    <img src="{% static 'imagenes/añadir.png' %}" alt="Añadir" style="height: 50px; width: 50px;">
                </a>
                {% endif %}
            </div>
        </div>
        <section class="tablon">
            {% for observacion in observaciones %}
            <div class="card">
                <div class="topCard">
                    <div class="date">
                        <h3>{{observacion.Fecha|date:"d/m/Y"}}</h3>
                    </div>
                    {% if nombre in adminList %}
                    <div class="deleteBtn">
                        <a href="{% url 'deleteObservacion' observacion.id id %}">
                            <img src="{% static 'imagenes/signo-menos.png' %}" alt="delete">
                        </a>
                    </div>
                    {% endif %}
                </div>
                <div class="text">
                    <p>{{observacion.Descripcion}}</p>
                </div>
            </div>
            {% endfor %}
        </section>
    </main>
</body>
</html>
