{% load static %}
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/observacion.css' %}">
    <script src="{% static 'js/observacion.js' %}"></script>
</head>

<body>
    <main>
        <div class="header">
            <div class="home_icon">
                <a href="{% url 'home' %}">
                    <img src="{% static 'imagenes/flecha.png' %}" alt="Back">
                </a>
            </div>
            <div class="logo">
                <img src="https://okoa.tech/wp-content/uploads/2023/04/Logo-Okoa.png" alt="Logo">
            </div>
        </div>
        <section class="section-container">
            <div class="div-title"><h1>Observaciones</h1></div>
            <form method="post" action="{% url 'observacion' %}">
                {% csrf_token %}
                <div class="div-select">
                    <div class="div-ofertas">
                        <select onchange="valorDesplegable('{{jsonDic}}')" name="clave" id="ofertaClave">
                            {% for oferta, solicitudes in diccionario.items %}
                                <option value="{{oferta}}">{{oferta}}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="div-solicitudes">
                        <select name="valor" id="solicitudes" size="5">
                        </select>
                    </div>
                </div>
                <div class="div-container">
                    {{ form.Descripcion }}
                </div>
                <div class="send">
                    <button type="submit"">Enviar</button>
                </div>
            </form>
        </section>
    </main>
</body>
