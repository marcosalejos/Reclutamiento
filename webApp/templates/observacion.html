{% load static %}
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Observación - Okoa</title>
    <link rel="icon" href="https://okoa.tech/wp-content/uploads/2023/06/3.jpg">
    <link rel="stylesheet" href="{% static 'css/observacion.css' %}">
    <script src="{% static 'js/observacion.js' %}"></script>

</head>

<body>
    <main>
        <div class="header">
            <div class="home_icon">
                <a href="{% url 'observacionesSolicitud' id %}">
                    <img src="{% static 'imagenes/flecha.png' %}" alt="Back">
                </a>
            </div>
            <div class="logo">
                <img src="https://okoa.tech/wp-content/uploads/2023/04/Logo-Okoa.png" alt="Logo">
            </div>
        </div>
        <section class="section-container">
            <div class="div-title"><h1>Nueva Observación</h1></div>
            <form id="formulario" method="post" action="{% url 'observacion' id %}">
                {% csrf_token %}
                <div class="div-container">
                    {{ form.Descripcion }}
                </div>
                <div class="send">
                    <button type="submit"">Enviar</button>
                </div>
            </form>
        </section>
    </main>

    
</body>
