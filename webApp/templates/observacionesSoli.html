<!DOCTYPE html>
<html lang="es">

{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/observacionesSoli.css' %}">
</head>
<body>
    <main>
        <div class="header">
            <div class="home_icon">
                <a href="{% url 'home' %}">
                    <img src="{% static 'imagenes/flecha.png' %}" alt="Back">
                </a>
            </div>
            <div class="logo">
                <img src="https://okoa.tech/wp-content/uploads/2023/04/Logo-Okoa.png" alt="Logo">
            </div>
        </div>
        <section class="tablon">
            {% for observacion in observaciones %}
            <div class="card">
                <div class="date">
                    <h3>{{observacion.Fecha|date:"d/m/Y"}}</h3>
                </div>
                <div class="text">
                    <p>{{observacion.Descripcion}}</p>
                </div>
            </div>
            {% endfor %}
        </section>
    </main>
</body>
</html>
